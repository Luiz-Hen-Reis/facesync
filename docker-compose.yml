services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: facesync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: facesync
      POSTGRES_PASSWORD: facesync123
      POSTGRES_DB: facesync_dev
    ports:
      - "5432:5432"
    volumes:
      - facesync:/var/lib/postgresql/data

volumes:
  facesync:
